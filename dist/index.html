<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- Primary Meta -->
    <title>ParkNow</title>
    <meta name="title" content="ParkNow" />
    <meta name="description" content="تطبيق حجز جراجات السيارات" />

    <!-- Theme -->
    <meta name="theme-color" content="#020617" />
    <meta name="background-color" content="#020617" />

    <!-- PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="ParkNow" />
    <meta name="application-name" content="ParkNow" />
    <meta name="msapplication-TileColor" content="#020617" />

    <!-- Manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Icons -->
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="./icons/icon-192x192.png"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="./icons/icon-96x96.png"
    />

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      rel="preconnect"
      href="https://fhrwmjaiahpijptllysp.supabase.co"
      crossorigin
    />

    <!-- Preload -->
    <link
      rel="preload"
      href="./images/logo.png"
      as="image"
      type="image/png"
    />

    <!-- Global Styles -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        width: 100%;
        min-height: 100%;
        background: #020617;
      }

      body {
        overscroll-behavior-y: contain;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        font-family: system-ui, sans-serif;
      }

      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
    </style>

        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register(
              '/sw.js'
            );

            console.log(
              '✅ Service Worker registered:',
              registration.scope
            );
          } catch (error) {
            console.error(

              error
            );
          }
        });
      }
    </script>
