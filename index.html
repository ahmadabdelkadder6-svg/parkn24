<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#020617" />
    <meta name="background-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ParkNow" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="ParkNow" />
    <meta name="msapplication-TileColor" content="#020617" />
    <meta name="description" content="تطبيق حجز جراجات السيارات" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />

    <!-- Splash Screens for iOS -->
    <style>
      /* منع السحب للتحديث */
      body {
        overscroll-behavior-y: contain;
        -webkit-user-select: none;
        user-select: none;
      }
      /* Safe area padding */
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
    </style>

    <title>ParkNow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- تسجيل Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((reg) => {
              console.log('✅ Service Worker مسجل:', reg.scope);
            })
            .catch((err) => {
              console.log('❌ فشل تسجيل Service Worker:', err);
            });
        });
      }
    </script>
  </body>
</html>
